services:
  postgres:
    # Using the pgvector image — drop-in replacement for postgres:16 with the
    # `vector` extension preinstalled. Required for RAG semantic search.
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: whatsapp_ai
    ports:
      - "5436:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Backend: Baileys WhatsApp gateway + BullMQ worker. No HTTP.
  # Single instance, never scaled — Baileys holds one socket.
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/whatsapp_ai
      REDIS_URL: redis://redis:6379
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
      - ./sessions:/app/sessions
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Frontend + API: Next.js. Stateless, can be scaled.
  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/whatsapp_ai
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    volumes:
      - ./web/src:/app/src
      - ./prisma:/app/prisma
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  adminer:
    image: adminer:4-standalone
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha-dark
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools

  redis-commander:
    image: rediscommander/redis-commander:latest
    ports:
      - "8081:8081"
    environment:
      REDIS_HOSTS: local:redis:6379
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - tools

  prisma-studio:
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/whatsapp_ai
    command: ["npx", "prisma", "studio", "--port", "5555", "--hostname", "0.0.0.0"]
    ports:
      - "5555:5555"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools

volumes:
  pgdata:
  redisdata:
